name: Deploy Kiosk Bot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/kiosk-bot
            git pull origin main
            npm install
            sudo systemctl restart kiosk-bot
            sudo systemctl status kiosk-bot --no-pager